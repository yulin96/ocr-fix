<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR 文字修复工具 · Unicode 伪中文替换</title>
    <meta
      name="description"
      content="批量检测并替换 OCR 识别文本中混入的 Unicode 伪中文字符（如 Kangxi 部首等），一键转换并高亮显示问题字符。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0f18;
        --surface: #141722;
        --surface2: #1c2032;
        --border: #2a2f47;
        --border-hover: #3d4566;
        --accent: #6c63ff;
        --accent2: #a259ff;
        --danger: #ff4d6d;
        --danger-bg: rgba(255, 77, 109, 0.15);
        --success: #22d3a5;
        --text: #e8eaf6;
        --text-muted: #7b82a8;
        --text-dim: #4a5080;
        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --glow: 0 0 40px rgba(108, 99, 255, 0.15);
      }

      html {
        font-size: 16px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', 'Noto Sans SC', sans-serif;
        min-height: 100vh;
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* ── Background decoration ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% -10%, rgba(108, 99, 255, 0.12) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 80% 110%, rgba(162, 89, 255, 0.1) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }

      /* ── Header ── */
      header {
        text-align: center;
        margin-bottom: 48px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(108, 99, 255, 0.15);
        border: 1px solid rgba(108, 99, 255, 0.35);
        border-radius: 100px;
        padding: 4px 14px;
        font-size: 12px;
        font-weight: 500;
        color: #a09dff;
        letter-spacing: 0.04em;
        margin-bottom: 20px;
      }

      h1 {
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 700;
        background: linear-gradient(135deg, #e8eaf6 0%, #a09dff 50%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        margin-bottom: 12px;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 15px;
        font-weight: 400;
        max-width: 520px;
        margin: 0 auto;
      }

      .subtitle code {
        background: rgba(108, 99, 255, 0.2);
        border: 1px solid rgba(108, 99, 255, 0.3);
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 13px;
        color: #c0bdff;
        font-family: 'Menlo', 'Consolas', monospace;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: border-color 0.3s;
      }

      .card:focus-within {
        border-color: var(--border-hover);
        box-shadow: var(--shadow), var(--glow);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
      }

      .card-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .char-count {
        font-size: 12px;
        color: var(--text-dim);
        font-variant-numeric: tabular-nums;
      }

      /* ── Textarea ── */
      textarea {
        width: 100%;
        min-height: 220px;
        padding: 20px;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 15px;
        font-family: inherit;
        line-height: 1.8;
        resize: vertical;
        caret-color: var(--accent);
      }

      textarea::placeholder {
        color: var(--text-dim);
      }

      /* ── Stats bar ── */
      .stats-bar {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 10px 20px;
        border-top: 1px solid var(--border);
        background: var(--surface2);
        flex-wrap: wrap;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .stat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--danger);
        flex-shrink: 0;
      }

      .stat-dot.green {
        background: var(--success);
      }

      .stat-num {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }

      /* ── Action buttons ── */
      .actions {
        display: flex;
        gap: 12px;
        margin: 24px 0;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
        outline: none;
        user-select: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
        color: #fff;
        box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(108, 99, 255, 0.5);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
        border-color: var(--border-hover);
        transform: translateY(-2px);
      }

      .btn-secondary:active {
        transform: translateY(0);
      }

      .btn-icon {
        font-size: 16px;
      }

      /* ── Output area ── */
      #output-section {
        display: none;
      }
      #output-section.visible {
        display: block;
      }

      .output-content {
        padding: 20px;
        font-size: 15px;
        line-height: 1.8;
        word-break: break-all;
        white-space: pre-wrap;
        min-height: 120px;
      }

      .highlight-bad {
        color: var(--danger);
        background: var(--danger-bg);
        border-radius: 3px;
        padding: 0 2px;
        border-bottom: 2px solid var(--danger);
        cursor: help;
        position: relative;
        font-weight: 700;
        display: inline-block;
        animation: pulse-bad 1.5s ease-in-out infinite;
      }

      @keyframes pulse-bad {
        0%,
        100% {
          background: var(--danger-bg);
        }
        50% {
          background: rgba(255, 77, 109, 0.25);
        }
      }

      .highlight-fixed {
        color: var(--success);
        background: rgba(34, 211, 165, 0.12);
        border-radius: 3px;
        padding: 0 2px;
        border-bottom: 2px solid var(--success);
        cursor: help;
        font-weight: 700;
        display: inline-block;
      }

      /* ── Toast ── */
      #toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        color: var(--success);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
        z-index: 999;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── Character table ── */
      .map-section {
        margin-top: 48px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .map-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 8px;
      }

      .map-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: border-color 0.2s;
      }

      .map-item:hover {
        border-color: var(--border-hover);
      }

      .map-chars {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 20px;
        flex-shrink: 0;
      }

      .map-arrow {
        font-size: 12px;
        color: var(--text-dim);
      }

      .map-bad {
        color: var(--danger);
      }
      .map-good {
        color: var(--success);
      }

      .map-meta {
        font-size: 10px;
        color: var(--text-dim);
        font-family: 'Menlo', 'Consolas', monospace;
        line-height: 1.4;
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 32px 0;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .actions {
          flex-direction: column;
        }
        .btn {
          width: 100%;
          justify-content: center;
        }
        .map-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- Header -->
      <header>
        <div class="badge">🔬 Unicode 字符检测</div>
        <h1>OCR 文字修复工具</h1>
        <p class="subtitle">
          自动检测并替换文本中混入的「伪中文字符」，例如 Kangxi 部首
          <code>⽉ U+2F49</code> → <code>月 U+6708</code>
        </p>
      </header>

      <!-- Input -->
      <div class="card" id="input-card">
        <div class="card-header">
          <span class="card-label">📋 输入文本</span>
          <span class="char-count" id="input-count">0 字符</span>
        </div>
        <textarea
          id="input-text"
          placeholder="粘贴需要修复的文本…&#10;&#10;例如：售票截⽌时间：主会售票（即VIP/优享/全通票）5⽉12⽇17点关闭"
          spellcheck="false"
        ></textarea>
        <div class="stats-bar" id="input-stats" style="display: none">
          <div class="stat-item">
            <div class="stat-dot"></div>
            <span>发现 <span class="stat-num" id="bad-count">0</span> 个问题字符</span>
          </div>
          <div class="stat-item">
            <div class="stat-dot green"></div>
            <span>可修复 <span class="stat-num" id="fix-count">0</span> 个</span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" id="btn-convert" onclick="convert(false)">
          <span class="btn-icon">⚡</span> 检测 &amp; 转换
        </button>
        <button class="btn btn-secondary" id="btn-copy" onclick="convert(true)" disabled>
          <span class="btn-icon">📋</span> 转换并复制
        </button>
        <button class="btn btn-secondary" id="btn-clear" onclick="clearAll()">
          <span class="btn-icon">🗑️</span> 清空
        </button>
      </div>

      <!-- Output -->
      <div id="output-section">
        <div class="card">
          <div class="card-header">
            <span class="card-label">✅ 修复预览</span>
            <span class="char-count" id="output-meta"></span>
          </div>
          <div class="output-content" id="output-content"></div>
          <div class="stats-bar">
            <div class="stat-item" id="legend-bad" style="display: none">
              <div class="stat-dot"></div>
              <span>红色高亮 = 原始问题字符（已替换）</span>
            </div>
            <div class="stat-item" id="legend-unk" style="display: none">
              <div class="stat-dot" style="background: #f59e0b"></div>
              <span>橙色 = 可疑字符（无映射，需手动处理）</span>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Char map table -->
      <div class="map-section">
        <div class="section-title">替换字符映射表</div>
        <div class="map-grid" id="map-grid"></div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast">✓ 已复制到剪贴板</div>

      // ────────────────────────────────────────────────
      // Detect: does the char look like Chinese but isn't?
      // ────────────────────────────────────────────────
      function isSuspiciousChar(ch) {
        const cp = ch.codePointAt(0)
        // Kangxi radicals
        if (cp >= 0x2f00 && cp <= 0x2fd5) return true
        // CJK Radicals Supplement
        if (cp >= 0x2e80 && cp <= 0x2eff) return true
        // CJK Compatibility Ideographs
        if (cp >= 0xf900 && cp <= 0xfaff) return true
        // CJK Compatibility Ideographs Supplement
        if (cp >= 0x2f800 && cp <= 0x2fa1f) return true
        return false
      }

      function hasFix(ch) {
        return !!KANGXI_MAP[ch]
      }

      // ────────────────────────────────────────────────
      // Convert text
      // ────────────────────────────────────────────────
      function convertText(input) {
        let result = ''
        let badCount = 0
        let fixCount = 0
        for (const ch of [...input]) {
          if (isSuspiciousChar(ch)) {
            badCount++
            if (KANGXI_MAP[ch]) {
              result += KANGXI_MAP[ch]
              fixCount++
            } else {
              result += ch // unknown, keep
            }
          } else {
            result += ch
          }
        }
        return { result, badCount, fixCount }
      }

      // ────────────────────────────────────────────────
      // Build highlighted HTML for ORIGINAL text
      // ────────────────────────────────────────────────
      function buildHighlightHTML(input) {
        let html = ''
        for (const ch of [...input]) {
          if (isSuspiciousChar(ch)) {
            const fix = KANGXI_MAP[ch]
            const cp = '\\u' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')
            if (fix) {
              html += `<mark class="highlight-bad" title="原: ${ch} (${cp})  →  替换为: ${fix}">${fix}</mark>`
            } else {
              html += `<mark class="highlight-bad" style="border-bottom-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.12);" title="可疑字符: ${ch} (${cp})  无映射">${ch}</mark>`
            }
          } else {
            // escape HTML
            html +=
              ch === '&' ? '&amp;'
              : ch === '<' ? '&lt;'
              : ch === '>' ? '&gt;'
              : ch
          }
        }
        return html
      }

      // ────────────────────────────────────────────────
      // Realtime analysis on input
      // ────────────────────────────────────────────────
      const inputEl = document.getElementById('input-text')
      const inputCount = document.getElementById('input-count')
      const inputStats = document.getElementById('input-stats')
      const badCountEl = document.getElementById('bad-count')
      const fixCountEl = document.getElementById('fix-count')
      const btnCopy = document.getElementById('btn-copy')

      inputEl.addEventListener('input', () => {
        const val = inputEl.value
        inputCount.textContent = [...val].length + ' 字符'
        if (val.trim()) {
          const { badCount, fixCount } = convertText(val)
          inputStats.style.display = 'flex'
          badCountEl.textContent = badCount
          fixCountEl.textContent = fixCount
          btnCopy.disabled = false
        } else {
          inputStats.style.display = 'none'
          btnCopy.disabled = true
        }
      })

      // ────────────────────────────────────────────────
      // Convert action
      // ────────────────────────────────────────────────
      let lastConverted = ''

      function convert(andCopy) {
        const input = inputEl.value
        if (!input.trim()) return

        const { result, badCount, fixCount } = convertText(input)
        lastConverted = result

        const outputSection = document.getElementById('output-section')
        const outputContent = document.getElementById('output-content')
        const outputMeta = document.getElementById('output-meta')
        const legendBad = document.getElementById('legend-bad')
        const legendUnk = document.getElementById('legend-unk')

        outputSection.classList.add('visible')
        outputContent.innerHTML = buildHighlightHTML(input)
        outputMeta.textContent = `替换 ${fixCount} 个字符`

        legendBad.style.display = fixCount > 0 ? 'flex' : 'none'
        legendUnk.style.display = badCount > fixCount ? 'flex' : 'none'

        outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' })

        if (andCopy) {
          navigator.clipboard.writeText(result).then(() => showToast('✓ 已复制纯文本到剪贴板'))
        }
      }

      // ────────────────────────────────────────────────
      // Clear
      // ────────────────────────────────────────────────
      function clearAll() {
        inputEl.value = ''
        inputCount.textContent = '0 字符'
        inputStats.style.display = 'none'
        document.getElementById('output-section').classList.remove('visible')
        btnCopy.disabled = true
        inputEl.focus()
      }

      // ────────────────────────────────────────────────
      // Toast
      // ────────────────────────────────────────────────
      function showToast(msg) {
        const t = document.getElementById('toast')
        t.textContent = msg
        t.classList.add('show')
        setTimeout(() => t.classList.remove('show'), 2500)
      }

      // ────────────────────────────────────────────────
      // Build char map display (top 30 Kangxi radicals)
      // ────────────────────────────────────────────────
      function buildMapGrid() {
        const grid = document.getElementById('map-grid')
        const showKeys = Object.keys(KANGXI_MAP).slice(0, 50)
        showKeys.forEach((k) => {
          const v = KANGXI_MAP[k]
          const cp = k.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')
          const item = document.createElement('div')
          item.className = 'map-item'
          item.innerHTML = `
      <div class="map-chars">
        <span class="map-bad">${k}</span>
        <span class="map-arrow">→</span>
        <span class="map-good">${v}</span>
      </div>
      <div class="map-meta">U+${cp}<br/>${k} ≠ ${v}</div>
    `
          grid.appendChild(item)
        })
      }

      buildMapGrid()
    </script>
