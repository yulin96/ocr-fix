<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR 文字修复工具 · Unicode 伪中文替换</title>
    <meta
      name="description"
      content="批量检测并替换 OCR 识别文本中混入的 Unicode 伪中文字符（如 Kangxi 部首等），一键转换并高亮显示问题字符。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      const savedTheme = localStorage.getItem('theme')
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark')
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

      <header>
        <div class="badge">🔬 Unicode 字符检测</div>
        <h1>OCR 文字修复工具</h1>
        <p class="subtitle">
          自动检测并替换文本中混入的「伪中文字符」，例如 Kangxi 部首
          <code>⽉ U+2F49</code> → <code>月 U+6708</code>
        </p>
      </header>

      <section class="range-panel" aria-label="转换区段选择">
        <div class="section-title">转换区段</div>
        <div class="range-grid" id="range-options">
          <label class="range-option" data-tooltip="康熙部首：U+2F00~U+2FD5，收录康熙字典 214 个部首。">
            <input type="checkbox" data-range-key="kangxi" checked />
            <span class="range-option-content">
              <span class="range-name">康熙部首</span>
              <span class="range-code">U+2F00–U+2FD5</span>
            </span>
          </label>
          <label class="range-option" data-tooltip="部首扩展：U+2E80~U+2EFF，其中一些部首与统一汉字同形。">
            <input type="checkbox" data-range-key="radicals-supplement" checked />
            <span class="range-option-content">
              <span class="range-name">部首扩展</span>
              <span class="range-code">U+2E80–U+2EFF</span>
            </span>
          </label>
          <label
            class="range-option"
            data-tooltip="兼容汉字：U+F900~U+FAFF，部分字形与统一汉字在大多数系统中显示相同。"
          >
            <input type="checkbox" data-range-key="compat-ideographs" checked />
            <span class="range-option-content">
              <span class="range-name">兼容汉字</span>
              <span class="range-code">U+F900–U+FAFF</span>
            </span>
          </label>
          <label class="range-option" data-tooltip="兼容扩展：U+2F800~U+2FA1F，收录更多写法不同的兼容汉字。">
            <input type="checkbox" data-range-key="compat-ideographs-supplement" checked />
            <span class="range-option-content">
              <span class="range-name">兼容扩展</span>
              <span class="range-code">U+2F800–U+2FA1F</span>
            </span>
          </label>
        </div>
        <p class="range-note">只转换勾选的区段；未勾选的字符会原样保留。</p>
      </section>

      <div class="card" id="input-card">
        <div class="card-header">
          <span class="card-label">📋 输入文本</span>
          <span class="char-count" id="input-count">0 字符</span>
        </div>
        <textarea
          id="input-text"
          placeholder="粘贴需要修复的文本…&#10;&#10;例如：售票截⽌时间：主会售票（即VIP/优享/全通票）5⽉12⽇17点关闭"
          spellcheck="false"
        ></textarea>
        <div class="stats-bar" id="input-stats" style="display: none">
          <div class="stat-item">
            <div class="stat-dot"></div>
            <span>发现 <span class="stat-num" id="bad-count">0</span> 个问题字符</span>
          </div>
          <div class="stat-item">
            <div class="stat-dot green"></div>
            <span>可修复 <span class="stat-num" id="fix-count">0</span> 个</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btn-copy" onclick="convert(true)" disabled>
          <span class="btn-icon">📋</span> 转换并复制
        </button>
        <button class="btn btn-secondary" id="btn-convert" onclick="convert(false)">
          <span class="btn-icon">⚡</span> 检测 &amp; 转换
        </button>
        <button class="btn btn-secondary" id="btn-clear" onclick="clearAll()">
          <span class="btn-icon">🗑️</span> 清空
        </button>
      </div>

      <div id="output-section">
        <div class="card">
          <div class="card-header">
            <span class="card-label">✅ 修复预览</span>
            <span class="char-count" id="output-meta"></span>
          </div>
          <div class="output-content" id="output-content"></div>
          <div class="stats-bar">
            <div class="stat-item" id="legend-bad" style="display: none">
              <div class="stat-dot"></div>
              <span>红色高亮 = 原始问题字符（已替换）</span>
            </div>
            <div class="stat-item" id="legend-unk" style="display: none">
              <div class="stat-dot" style="background: #f59e0b"></div>
              <span>橙色 = 可疑字符（无映射，需手动处理）</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast">✓ 已复制到剪贴板</div>
    <div id="range-tooltip" class="range-tooltip" aria-hidden="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
